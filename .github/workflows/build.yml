name: Build Mod

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.8'
      - name: Build
        run: gradle build
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: cobble-pc-delete
          path: build/libs/cobble-pc-delete-1.0.0.jar
